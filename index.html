<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Progress</title>
    <style>
        /* Mengatur dasar halaman gelap */
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0c;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Latar belakang garis grid halus seperti di gambar */
        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        /* Kotak UI Utama */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(18, 18, 20, 0.4);
            padding: 50px 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            max-width: 520px;
            width: 90%;
        }

        /* Efek lingkaran cahaya redup di belakang kotak */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
        }

        /* Gaya Teks Utama */
        h1 {
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin: 0 0 15px 0;
            background: linear-gradient(180deg, #ffffff 0%, #a3a3a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Gaya Teks Tambahan (Status Progres) */
        .status-text {
            font-size: 1.1rem;
            color: #8a8a93;
            margin-bottom: 35px;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Animasi titik berkedip kecil untuk status online/proses */
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #30d158; /* Warna hijau indikator */
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #30d158;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* Garis pembatas tipis */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            margin: 25px 0;
        }

        /* Gaya Teks Pembuat di Bawah */
        .footer-text {
            font-size: 0.85rem;
            color: #52525b;
            letter-spacing: 1px;
            text-transform: lowercase;
        }

        .footer-text span {
            color: #a1a1aa;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- Efek Latar Belakang -->
    <div class="grid-bg"></div>
    <div class="glow"></div>

    <!-- Konten UI -->
    <div class="container">
        <h1>Thank You For Visiting Our Website</h1>
        <div class="status-text">
            <span class="status-dot"></span>
            The website is currently in progress
        </div>
        <div class="divider"></div>
        <div class="footer-text">made by <span>IndraTheGreat</span></div>
    </div>

</body>
</html>
